<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DAIWA Shift (STAFF)</title>
  <style>
    :root{
      --bg:#0b1220; --card:rgba(255,255,255,.06); --bd:rgba(255,255,255,.10);
      --tx:#e8eefc; --mut:#aab6d3; --warn:#cfa7ff; --ok:#28d17c;
      --shadow: 0 20px 70px rgba(0,0,0,.35); --radius:18px; --btnH:54px;
    }
    *{box-sizing:border-box}
    body{ margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--tx); }
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 34px;}
    .card{ background:var(--card); border:1px solid var(--bd); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); }
    h1{margin:0 0 10px;font-size:20px;font-weight:950;}
    .mut{color:var(--mut);font-weight:900}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input,select,button{ border-radius:14px;border:1px solid var(--bd); background:rgba(0,0,0,.20);color:var(--tx); padding:12px 14px;font-weight:900;font-size:16px; min-height:var(--btnH); }
    button{cursor:pointer}
    button.primary{background:rgba(40,209,124,.90);color:#062012;border:none}
    button.ghost{background:rgba(255,255,255,.06)}
    button.danger{background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.35);font-size:14px;padding:8px 12px;min-height:auto;}
    button:disabled{opacity:.35;cursor:not-allowed}
    .status{ margin-top:10px;padding:12px 14px;border-radius:14px; background:rgba(0,0,0,.25); min-height:46px;font-weight:950 }
    .status.bad{background:rgba(255,77,109,.12);box-shadow:inset 0 0 0 1px rgba(255,77,109,.35)}
    .box{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;margin-top:12px}
    .list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .item{ display:flex;justify-content:space-between;align-items:center;padding:12px 14px; border-radius:14px;border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.05) }
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .tab{min-height:44px;padding:10px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);font-weight:950}
    .tab.on{background:rgba(40,209,124,.18);border-color:rgba(40,209,124,.45)}
    .hint{margin-top:8px;color:rgba(255,255,255,.45);font-size:12px;line-height:1.6}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}

    /* =========================================
       📱 スマホ用カレンダーUI（縦並び自動変換）
       ========================================= */
    @media (max-width: 768px) {
      .cal, .cal tbody, .cal tr, .cal td {
        display: block; /* 表の構造を解除してブロックにする */
        width: 100%;
      }
      .cal thead {
        display: none; /* スマホでは上の曜日ヘッダー（月火水…）を隠す */
      }
      .cal td {
        margin-bottom: 12px; /* 1日ごとのカードの間に隙間を空ける */
        border: 1px solid rgba(255,255,255,.15);
        background: rgba(255,255,255,.05);
      }
      .cal .day {
        font-size: 16px; /* 日付部分を少し目立たせる */
        border-bottom: 1px solid rgba(255,255,255,.1);
        padding-bottom: 8px;
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>📱 DAIWA Shift (STAFF用)</h1>

      <div class="box" style="border-color: rgba(40,209,124,.3);">
        <div class="mut" style="font-size:12px">👤 あなたの名前（自動保存されます）</div>
        <select id="myStaffId" style="width:100%;margin-top:6px;"></select>
      </div>

      <div class="tabs">
        <button class="tab on" id="tabReq">希望シフトを出す</button>
        <button class="tab" id="tabDay">確定シフトを見る</button>
      </div>

      <div class="status" id="status">読込中…</div>

      <div id="viewReq">
        <div class="box">
          <div class="mut">📅 希望日と時間を入力</div>
          <div class="row" style="margin-top:10px">
            <input id="reqDate" type="date" style="flex:1;min-width:180px">
          </div>
          <div class="two" style="margin-top:10px">
            <div>
              <div class="mut" style="font-size:12px">START</div>
              <input id="reqStart" type="time" step="60" style="width:100%;margin-top:6px;">
            </div>
            <div>
              <div class="mut" style="font-size:12px">END</div>
              <input id="reqEnd" type="time" step="60" style="width:100%;margin-top:6px;">
            </div>
          </div>
          <div class="row" style="margin-top:10px">
            <button class="primary" id="btnSubmitReq" style="flex:1">希望を送信する</button>
          </div>
          <div class="hint">※送信した希望は店長に届きます。確定するまではシフトに入れません。</div>
        </div>

        <div class="box">
          <div class="mut">📩 送信済みの希望（この日）</div>
          <div class="row" style="margin-top:8px">
            <button id="btnLoadReq">この日の希望を確認</button>
          </div>
          <div class="list" id="reqList"></div>
        </div>
      </div>

      <div id="viewDay" style="display:none">
        <div class="box">
          <div class="mut">日付</div>
          <div class="row" style="margin-top:8px">
            <input id="datePick" type="date" style="flex:1;min-width:180px">
            <button id="btnLoadDay">シフトを見る</button>
          </div>
        </div>
        <div class="box">
          <div class="mut">この日の出勤メンバー</div>
          <div class="list" id="dayList"></div>
        </div>
      </div>

    </div>
  </div>

<script>
  // ====== ★店長用と同じURLをここに貼り付けてください ======
  const API_URL = "https://script.google.com/macros/s/AKfycbx80UCLAshx79arn3xal3ea6z3XWEAHSche7lsoRmnJAY8D8E4iiUB6R6Patxf1gMBu/exec";
  const TOKEN   = "DAIWA_SHIFT_2026";
  // =======================================

  const el = {
    myStaffId: document.querySelector("#myStaffId"),
    tabReq: document.querySelector("#tabReq"),
    tabDay: document.querySelector("#tabDay"),
    viewReq: document.querySelector("#viewReq"),
    viewDay: document.querySelector("#viewDay"),
    status: document.querySelector("#status"),
    
    reqDate: document.querySelector("#reqDate"),
    reqStart: document.querySelector("#reqStart"),
    reqEnd: document.querySelector("#reqEnd"),
    btnSubmitReq: document.querySelector("#btnSubmitReq"),
    btnLoadReq: document.querySelector("#btnLoadReq"),
    reqList: document.querySelector("#reqList"),
    
    datePick: document.querySelector("#datePick"),
    btnLoadDay: document.querySelector("#btnLoadDay"),
    dayList: document.querySelector("#dayList"),
  };

  function setStatus(msg, bad=false){
    el.status.textContent = msg;
    el.status.classList.toggle("bad", !!bad);
  }
  function pad2(n){ return String(n).padStart(2,"0"); }
  function toYmdDash(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function normalizeDate(s){
    const m = String(s||"").trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[1]}/${m[2]}/${m[3]}` : "";
  }
  function isTime(s){ return /^([01]\d|2[0-3]):([0-5]\d)$/.test(String(s||"").trim()); }

  async function fetchJson(url, opt){
    const res = await fetch(url, opt);
    const j = await res.json();
    if(!res.ok || j.ok === false) throw new Error(j.message || "API error");
    return j;
  }
  async function apiGet(params){
    const u = new URL(API_URL);
    u.searchParams.set("token", TOKEN);
    u.searchParams.set("_t", Date.now());
    Object.entries(params).forEach(([k,v])=> u.searchParams.set(k, v));
    return await fetchJson(u.toString(), { method: "GET" });
  }
  async function apiPost(params){
    const body = new URLSearchParams();
    body.set("token", TOKEN);
    Object.entries(params).forEach(([k,v])=>body.set(k, v));
    return await fetchJson(API_URL, { method:"POST", body });
  }

  function setTab(isReq){
    el.tabReq.classList.toggle("on", isReq);
    el.tabDay.classList.toggle("on", !isReq);
    el.viewReq.style.display = isReq ? "" : "none";
    el.viewDay.style.display = isReq ? "none" : "";
  }

  async function init(){
    try{
      const today = toYmdDash(new Date());
      el.reqDate.value = today;
      el.datePick.value = today;

      // スタッフ一覧取得
      const r = await apiGet({ fn:"listStaff" });
      const items = r.items || [];
      const savedId = localStorage.getItem("DAIWA_MY_ID") || "";
      
      el.myStaffId.innerHTML = '<option value="">▼ 名前を選んでください</option>';
      items.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s.staff_id;
        opt.textContent = `${s.name || s.staff_id}`;
        if(s.staff_id === savedId) opt.selected = true;
        el.myStaffId.appendChild(opt);
      });

      setStatus("準備完了！");
      loadReqList();
    }catch(e){
      setStatus("初期化エラー: " + e.message, true);
    }
  }

  // 名前を保存する機能
  el.myStaffId.addEventListener("change", ()=>{
    localStorage.setItem("DAIWA_MY_ID", el.myStaffId.value);
  });

  // 希望シフトの送信
  el.btnSubmitReq.addEventListener("click", async ()=>{
    const staffId = el.myStaffId.value;
    const dateStr = el.reqDate.value;
    const date = normalizeDate(dateStr);
    const start = el.reqStart.value;
    const end = el.reqEnd.value;

    if(!staffId) return setStatus("⚠️ 一番上であなたの名前を選んでください", true);
    if(!date) return setStatus("日付を選んでください", true);
    if(!isTime(start) || !isTime(end)) return setStatus("時間を正しく入力してください", true);

    el.btnSubmitReq.disabled = true;
    setStatus("送信中...");
    try{
      await apiPost({ fn:"submitRequest", date, staff_id: staffId, start, end });
      setStatus(`✅ ${date} の希望を送信しました！`);
      el.reqStart.value = ""; el.reqEnd.value = "";
      loadReqList();
    }catch(e){
      setStatus("送信失敗: " + e.message, true);
    }finally{
      el.btnSubmitReq.disabled = false;
    }
  });

  // 希望シフトの確認（自分のだけではなくその日の希望リスト）
  async function loadReqList(){
    const date = normalizeDate(el.reqDate.value);
    if(!date) return;
    el.btnLoadReq.disabled = true;
    try{
      const r = await apiGet({ fn:"listRequest", date });
      el.reqList.innerHTML = "";
      if(!r.items || !r.items.length){
        el.reqList.innerHTML = `<div class="hint">この日に出されている希望はありません</div>`;
        return;
      }
      r.items.forEach(x => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div>
            <b>${x.name || x.staff_id}</b>
            <div class="hint">${x.start} 〜 ${x.end}</div>
          </div>
        `;
        // 自分の希望なら取り消しボタンを出す
        if(x.staff_id === el.myStaffId.value){
          const btn = document.createElement("button");
          btn.className = "danger";
          btn.textContent = "取消";
          btn.onclick = async () => {
            if(!confirm("この希望を取り消しますか？")) return;
            try{
              setStatus("取消中...");
              await apiPost({ fn:"deleteRequest", date, staff_id: x.staff_id });
              setStatus("取り消しました");
              loadReqList();
            }catch(e){ setStatus("取消失敗: "+e.message, true); }
          };
          div.appendChild(btn);
        }
        el.reqList.appendChild(div);
      });
    }catch(e){
      setStatus("読込失敗: " + e.message, true);
    }finally{
      el.btnLoadReq.disabled = false;
    }
  }

  // 確定シフトの確認
  async function loadDayList(){
    const date = normalizeDate(el.datePick.value);
    if(!date) return;
    setStatus("シフト確認中...");
    el.btnLoadDay.disabled = true;
    try{
      const r = await apiGet({ fn:"listShift", date });
      el.dayList.innerHTML = "";
      if(!r.items || !r.items.length){
        el.dayList.innerHTML = `<div class="hint">この日のシフトはまだありません</div>`;
      }else{
        r.items.forEach(x => {
          const div = document.createElement("div");
          div.className = "item";
          div.innerHTML = `<div><b>${x.name || x.staff_id}</b><div class="hint">${x.start} 〜 ${x.end}</div></div>`;
          el.dayList.appendChild(div);
        });
      }
      setStatus(`表示中: ${date}`);
    }catch(e){
      setStatus("読込失敗: " + e.message, true);
    }finally{
      el.btnLoadDay.disabled = false;
    }
  }

  el.tabReq.addEventListener("click", ()=>setTab(true));
  el.tabDay.addEventListener("click", ()=>{ setTab(false); loadDayList(); });
  el.btnLoadReq.addEventListener("click", loadReqList);
  el.btnLoadDay.addEventListener("click", loadDayList);
  el.reqDate.addEventListener("change", loadReqList);

  init();
</script>
</body>
</html>
