<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>DAIWA Shift OS</title>

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,.06);
  --bd:rgba(255,255,255,.10);
  --tx:#e8eefc;
  --mut:#9fb0d3;
  --accent:#28d17c;
  --danger:#ff4d6d;
}
body{
  margin:0;
  font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;
  background:var(--bg);
  color:var(--tx);
}
.wrap{max-width:1000px;margin:auto;padding:20px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:18px;padding:16px}
h1{margin:0 0 12px;font-size:20px}

button,input,select{
  border-radius:12px;
  border:1px solid var(--bd);
  background:rgba(0,0,0,.3);
  color:var(--tx);
  padding:10px 12px;
  font-weight:700;
}
button.primary{background:var(--accent);color:#001b0f;border:none}
button.danger{background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.4)}
button:disabled{opacity:.4}

.row{display:flex;gap:8px;flex-wrap:wrap}
.seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}

.status{margin-top:10px;padding:10px;border-radius:12px;background:rgba(0,0,0,.4)}
.status.bad{background:rgba(255,77,109,.2)}

.list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.item{
  display:flex;
  justify-content:space-between;
  background:rgba(255,255,255,.05);
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08)
}

/* ==== calendar ==== */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:12px;
}
.cal-head{
  text-align:center;
  font-weight:900;
  color:var(--mut);
}
.cal-day{
  background:rgba(255,255,255,.05);
  border-radius:10px;
  padding:8px;
  min-height:70px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.05);
  position:relative;
}
.cal-day:hover{background:rgba(255,255,255,.08)}
.cal-day.has{
  border:1px solid var(--accent);
  background:rgba(40,209,124,.1);
}
.cal-num{
  font-size:12px;
  color:var(--mut);
}
.badge{
  position:absolute;
  bottom:6px;
  right:6px;
  font-size:11px;
  background:var(--accent);
  color:#002b16;
  padding:2px 6px;
  border-radius:999px;
}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<h1>🗓️ DAIWA Shift OS</h1>

<div class="row">
  <input id="date" placeholder="yyyy/MM/dd">
</div>

<div class="seg">
  <button id="btnDay" class="primary">日</button>
  <button id="btnWeek">週</button>
  <button id="btnMonth">月</button>
</div>

<div class="status" id="status">初期化中…</div>

<div id="main"></div>

</div>
</div>

<script>
const API_URL="YOUR_GAS_URL";
const TOKEN="DAIWA_SHIFT_2026";

const el={
  date:qs("#date"),
  btnDay:qs("#btnDay"),
  btnWeek:qs("#btnWeek"),
  btnMonth:qs("#btnMonth"),
  status:qs("#status"),
  main:qs("#main")
};

let mode="day";

function qs(s){return document.querySelector(s)}
function pad(n){return String(n).padStart(2,"0")}
function todayStr(){const d=new Date();return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`}

function setStatus(m,b=false){
  el.status.textContent=m;
  el.status.classList.toggle("bad",b);
}

async function apiGet(params){
  const u=new URL(API_URL);
  u.searchParams.set("token",TOKEN);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
  const r=await fetch(u);
  const j=await r.json();
  if(!j.ok)throw new Error(j.message);
  return j;
}

function setMode(m){
  mode=m;
  el.btnDay.classList.toggle("primary",m==="day");
  el.btnWeek.classList.toggle("primary",m==="week");
  el.btnMonth.classList.toggle("primary",m==="month");
}

async function load(){
  const d=el.date.value.trim();
  if(!/^\d{4}\/\d{2}\/\d{2}$/.test(d))return setStatus("日付が不正",true);
  setStatus("読込中…");
  try{
    if(mode==="day"){
      const r=await apiGet({fn:"listShift",date:d});
      renderList(r.items);
    }
    if(mode==="week"){
      const w=getWeek(d);
      const r=await apiGet({fn:"listShiftRange",from:w.from,to:w.to});
      renderList(r.items);
    }
    if(mode==="month"){
      const m=getMonth(d);
      const r=await apiGet({fn:"listShiftRange",from:m.from,to:m.to});
      renderCalendar(m,r.items);
    }
    setStatus("表示完了");
  }catch(e){setStatus(e.message,true)}
}

function renderList(items){
  el.main.innerHTML="";
  if(!items.length){el.main.innerHTML="シフトなし";return;}
  const list=document.createElement("div");
  list.className="list";
  items.forEach(x=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`<div>${x.date} ${x.name||x.staff_id}</div><div>${x.start}〜${x.end}</div>`;
    list.appendChild(div);
  });
  el.main.appendChild(list);
}

/* ==== calendar ==== */
function renderCalendar(range,items){
  el.main.innerHTML="";
  const map={};
  items.forEach(x=>{
    if(!map[x.date])map[x.date]=[];
    map[x.date].push(x);
  });

  const cal=document.createElement("div");
  cal.className="calendar";

  ["月","火","水","木","金","土","日"].forEach(d=>{
    const h=document.createElement("div");
    h.className="cal-head";
    h.textContent=d;
    cal.appendChild(h);
  });

  const start=new Date(range.from.replaceAll("/","-"));
  const firstDay=(start.getDay()+6)%7;
  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement("div"));
  }

  let d=new Date(start);
  while(d<=new Date(range.to.replaceAll("/","-"))){
    const ds=`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
    const cell=document.createElement("div");
    cell.className="cal-day";
    cell.innerHTML=`<div class="cal-num">${d.getDate()}</div>`;
    if(map[ds]){
      cell.classList.add("has");
      const b=document.createElement("div");
      b.className="badge";
      b.textContent=map[ds].length;
      cell.appendChild(b);
      cell.onclick=()=>renderList(map[ds]);
    }
    cal.appendChild(cell);
    d.setDate(d.getDate()+1);
  }

  el.main.appendChild(cal);
}

/* ==== date helpers ==== */
function getWeek(d){
  const dt=new Date(d.replaceAll("/","-"));
  const day=(dt.getDay()+6)%7;
  dt.setDate(dt.getDate()-day);
  const from=fmt(dt);
  dt.setDate(dt.getDate()+6);
  const to=fmt(dt);
  return{from,to}
}
function getMonth(d){
  const dt=new Date(d.replaceAll("/","-"));
  const from=`${dt.getFullYear()}/${pad(dt.getMonth()+1)}/01`;
  const to=`${dt.getFullYear()}/${pad(dt.getMonth()+1)}/${pad(new Date(dt.getFullYear(),dt.getMonth()+1,0).getDate())}`;
  return{from,to}
}
function fmt(d){return`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`}

el.btnDay.onclick=()=>{setMode("day");load()}
el.btnWeek.onclick=()=>{setMode("week");load()}
el.btnMonth.onclick=()=>{setMode("month");load()}

el.date.value=todayStr();
load();
</script>
</body>
</html>
